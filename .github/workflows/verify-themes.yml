---
name: Theme Verification

on:
  push:
    branches:
      - master
    paths:
      - 'CTFd/themes/**'
  pull_request:
    branches:
      - master
    paths:
      - 'CTFd/themes/**'

jobs:
  build:

    runs-on: ubuntu-latest

    name: Theme Verification
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
          cache-dependency-path: |
            CTFd/themes/admin/yarn.lock
            CTFd/themes/core/yarn.lock

      - name: Verify admin theme
        run: |
            pwd
            yarn install --frozen-lockfile
            yarn verify
        working-directory: ./CTFd/themes/admin

      # TODO: Replace in 4.0 with deprecation of previous core theme
      - name: Verify core theme
        run: |
            pwd
            yarn install --frozen-lockfile
            yarn verify
        working-directory: ./CTFd/themes/core

      # ctfd-modern-theme uses npm + a committed package-lock.json.
      # `npm run verify` builds with Vite and fails if the committed
      # static/ assets differ from a fresh build.
      - name: Verify ctfd-modern-theme
        run: |
            pwd
            npm ci
            npm run verify
        working-directory: ./CTFd/themes/ctfd-modern-theme
