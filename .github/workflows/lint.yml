---
name: Linting

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    name: Linting
    steps:
      - uses: actions/checkout@v5
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: yarn
          cache-dependency-path: |
            CTFd/themes/admin/yarn.lock
            CTFd/themes/core/yarn.lock
      - name: Install dependencies
        run: |
            sudo yarn --cwd CTFd/themes/admin install --non-interactive
            sudo yarn --cwd CTFd/themes/core install --non-interactive

      - name: Lint
        run: uv run make lint
        env:
            TESTING_DATABASE_URL: 'sqlite://'

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: "Dockerfile"

      - name: Lint docker-compose
        run: |
            docker compose -f docker-compose.yml config

      - name: Lint translations
        run: |
          uv run make translations-lint

      - name: Check translations are compiled
        run: |
          uv run make translations-compile
          git diff --exit-code CTFd/translations/ || (echo "Translations need to be recompiled" && exit 1)

      - name: Check requirements.txt is up to date
        run: |
          make requirements
          git diff --exit-code requirements.txt || (echo "requirements.txt is out of sync with uv.lock, run 'make requirements'" && exit 1)
